services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: banking_accounts
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  postgres-tx:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: banking_transactions
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_tx_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  nats:
    image: nats:2.10-alpine
    command: ["-js"]
    ports:
      - "4222:4222"
      - "8222:8222" # management
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

  tempo:
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "3200:3200"   # tempo
      - "4317:4317"   # otlp grpc
      - "4318:4318"   # otlp http
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    ports:
      - "8080:8080"
    environment:
      - GOPROXY=direct
      - ACCOUNT_SERVICE_URL=account-service:50051
      - TRANSACTION_SERVICE_URL=transaction-service:50052
      - USER_SERVICE_URL=user-service:50053
      - ANALYTICS_SERVICE_URL=analytics-service:50054
    restart: unless-stopped

  account-service:
    build:
      context: .
      dockerfile: Dockerfile.account
    environment:
      - GOPROXY=direct
      - DATABASE_URL=postgres://user:password@postgres:5432/banking_accounts?sslmode=disable
      - NATS_URL=nats://nats:4222
    restart: unless-stopped
    depends_on:
      - postgres
      - nats

  transaction-service:
    build:
      context: .
      dockerfile: Dockerfile.transaction
    environment:
      - GOPROXY=direct
      - DATABASE_URL=postgres://user:password@postgres-tx:5432/banking_transactions?sslmode=disable
      - ACCOUNT_SERVICE_URL=account-service:50051
    restart: unless-stopped
    depends_on:
      - postgres-tx
      - account-service

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile.notification
    environment:
      - GOPROXY=direct
      - NATS_URL=nats://nats:4222
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
    restart: unless-stopped
    depends_on:
      - nats

  user-service:
    build:
      context: .
      dockerfile: Dockerfile.user
    environment:
      - GOPROXY=direct
    restart: unless-stopped

  analytics-service:
    build:
      context: .
      dockerfile: Dockerfile.analytics
    environment:
      - GOPROXY=direct
      - DATABASE_URL=postgres://user:password@postgres:5432/banking_accounts?sslmode=disable
      - ACCOUNT_SERVICE_URL=account-service:50051
    restart: unless-stopped
    depends_on:
      - postgres
      - account-service

volumes:
  postgres_data:
  postgres_tx_data:
  redis_data:
  prometheus_data:
  grafana_data:
